<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloce | Access Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-wrapper">
        <a href="/" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

        <div class="auth-container">
            <div class="auth-header">
                <div class="logo"><i class="fa-solid fa-car-side"></i> VELOCE</div>
                <p>Secure Client Gateway</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
            </div>

            <form id="form-login" class="auth-form active-form" onsubmit="handleAuth(event, 'login')">
                <div class="input-group">
                    <label for="login-email"><i class="fa-solid fa-envelope"></i> Email Address</label>
                    <input type="email" id="login-email" placeholder="name@domain.com" required>
                </div>

                <div class="input-group">
                    <label for="login-password"><i class="fa-solid fa-lock"></i> Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="login-password" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePasswordVisibility('login-password', this)"></i>
                    </div>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox"> <span>Remember device</span>
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Authenticate</button>
            </form>

            <form id="form-register" class="auth-form" onsubmit="handleAuth(event, 'register')">
                <div class="input-grid">
                    <div class="input-group">
                        <label for="reg-first"><i class="fa-solid fa-user"></i> First Name</label>
                        <input type="text" id="reg-first" placeholder="John" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-last">Last Name</label>
                        <input type="text" id="reg-last" placeholder="Doe" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-email"><i class="fa-solid fa-envelope"></i> Email Address</label>
                    <input type="email" id="reg-email" placeholder="yourname@email.com" required>
                </div>

                <div class="input-group">
                    <label for="reg-password"><i class="fa-solid fa-lock"></i> Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="reg-password" placeholder="Create strong password" required>
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePasswordVisibility('reg-password', this)"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label class="remember-me alignment-fix">
                        <input type="checkbox" required> <span>I accept the Terms of Service & Privacy Policy</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>

        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
